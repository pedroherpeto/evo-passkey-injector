# ─────────────────────────────────────────────────────────────────────────
# Exemplo: adicione o servico `evo-injector` ao docker-compose.yml do SEU
# Evolution / Evolution Go (o mesmo arquivo que ja tem api/postgres/redis).
# Ele fica na MESMA rede do(s) Postgres e alcanca o banco por dentro — o
# Postgres NUNCA precisa ser exposto.
#
# Um sidecar serve os DOIS backends. Ligue o(s) que voce usa preenchendo as
# DSNs correspondentes (pelo menos um bloco). Depois: defina INJECTOR_SECRET
# e cole URL+segredo no painel do zpro (Configuracoes -> Evolution / Evolution Go).
# ─────────────────────────────────────────────────────────────────────────
services:
  evo-injector:
    # Opcao A: imagem publicada no Docker Hub (sem build no cliente)
    image: zdgzpro/evo-passkey-injector:latest
    # Opcao B (alternativa): build local a partir desta pasta
    # build: ./evo-passkey-injector
    container_name: evo_passkey_injector
    restart: always
    environment:
      PORT: 8080
      INJECTOR_SECRET: ${EVO_INJECTOR_SECRET:?defina um segredo forte}
      # ── Evolution API (Baileys) — descomente se usar ──
      # EVO_DATABASE_URI: postgres://postgres:typebot@postgres:5432/evolution_db
      # ── Evolution Go (whatsmeow) — descomente se usar ──
      # EVOGO_AUTH_DATABASE_URI: postgres://postgres:senha@evogo-pg:5432/evogo_auth
      # EVOGO_USERS_DATABASE_URI: postgres://postgres:senha@evogo-pg:5432/evogo_users
      # ── Conectar ao vivo + UI (GET /) — descomente p/ o botao "Conectar" subir na hora ──
      # EVO_API_URL: http://evolution_api:8080
      # EVO_API_KEY: ${EVO_API_KEY}          # AUTHENTICATION_API_KEY do Evolution API
      # EVOGO_API_URL: http://evogo:8082
      # EVOGO_API_KEY: ${EVOGO_API_KEY}      # GLOBAL_API_KEY do Evolution Go (so p/ "Criar sessao")
    networks:
      # O injector precisa alcancar o(s) Postgres E a(s) API(s). Se Evolution e
      # Evolution Go estao em REDES diferentes, conecte o injector a AMBAS.
      - evolution-net
      # - evogo-net
    ports:
      # UI web + endpoints. zpro/uso local no MESMO host: mantenha 127.0.0.1.
      # Host SEPARADO: exponha atras de HTTPS/reverse-proxy (o segredo protege tudo).
      - "127.0.0.1:8085:8080"

# As redes sao definidas pelos composes do Evolution/Evolution Go. Referencie como externas:
# networks:
#   evolution-net:
#     external: true
#   evogo-net:
#     external: true
